<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55"/>
      <stop offset="55%" stop-color="#FF457A"/>
      <stop offset="100%" stop-color="#7C5CFC"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0ECE2"/>
    </linearGradient>
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background — anime brand pink → violet gradient -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner shine on top-left -->
  <ellipse cx="170" cy="120" rx="280" ry="120" fill="#FFFFFF" opacity="0.10"/>

  <!-- Centered play triangle — modern, slightly rounded points -->
  <g filter="url(#glow)">
    <path d="M 196 152 L 380 256 L 196 360 Z"
          fill="url(#play)"
          stroke="#FFFFFF"
          stroke-width="6"
          stroke-linejoin="round"
          stroke-linecap="round"/>
  </g>

  <!-- Four-point sparkle (anime kira-kira) top-right -->
  <g transform="translate(400 112)">
    <circle r="40" fill="url(#sparkle)" opacity="0.85"/>
    <path d="M 0 -28 C 4 -10 4 -10 28 0 C 4 10 4 10 0 28 C -4 10 -4 10 -28 0 C -4 -10 -4 -10 0 -28 Z"
          fill="#FFFFFF"/>
  </g>

  <!-- Smaller sparkle bottom-left -->
  <g transform="translate(112 412)">
    <circle r="22" fill="url(#sparkle)" opacity="0.7"/>
    <path d="M 0 -14 C 2 -5 2 -5 14 0 C 2 5 2 5 0 14 C -2 5 -2 5 -14 0 C -2 -5 -2 -5 0 -14 Z"
          fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
